apiVersion: fma.llm-d.ai/v1alpha1
kind: LauncherConfig
metadata:
  name: fma-launcher
spec:
  maxInstances: 2
  podTemplate:
    spec:
      runtimeClassName: nvidia
      containers:
        - name: inference-server
          # Keep this tag in sync with FMA_VERSION in guide.yaml / the guide env.
          image: ghcr.io/llm-d-incubation/llm-d-fast-model-actuation/launcher:v0.6.2
          command: ["/bin/bash", "-c"]
          args:
            - |
              python3 launcher.py \
              --host 0.0.0.0 \
              --port 8001 \
              --log-level info
          env:
            - name: HOME
              value: "/tmp"
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
