apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The namespaced Role/RoleBinding (and the ServiceAccount subject reference)
# are pinned to the guide's namespace so the binding is valid. The ClusterRole
# is cluster-scoped and is left un-namespaced by kustomize.
# If you deploy the guide into a different namespace, update this value to match.
namespace: llm-d-fast-model-actuation

resources:
  - clusterrole.yaml
  - role.yaml
  - rolebinding.yaml
