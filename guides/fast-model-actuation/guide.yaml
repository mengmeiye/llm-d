name: fast-model-actuation

env:
  static:
    BRANCH: main
    REPO_ROOT: $(realpath $(git rev-parse --show-toplevel))

    GUIDE_NAME: fast-model-actuation
    NAMESPACE:  llm-d-fast-model-actuation

    # FMA controller/CRD/image version. Bump alongside the pinned image tags in
    # modelserver/launcherconfig.yaml and requester/deployment.yaml on upgrade.
    FMA_VERSION:             { default: "0.6.2" }
    FMA_CHART_INSTANCE_NAME: fma

    MODEL:           { default: "Qwen/Qwen3-0.6B" }

    # VERIFICATION
    CURL_TEST_IMAGE: { default: "cfmanteiga/alpine-bash-curl-jq:latest" }

    # BENCHMARK
    BENCHMARK_REF: main
    HARNESS:       nop
    WORKLOAD:      nop.yaml
    GATEWAY_CLASS: { default: epponly, values: [epponly, gke, agentgateway, istio] }

  source: ["${REPO_ROOT}/guides/env.sh"]

prerequisites:
  clone:
    - skip_in: [ci]
      run: git clone https://github.com/llm-d/llm-d.git && cd llm-d && git checkout ${BRANCH}
  gaie:
    - run: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/${GAIE_VERSION}/v1-manifests.yaml
  namespace:
    - run: kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

deploy:
  fma_crds:
    - run: |
        FMA_CRD_BASE="https://raw.githubusercontent.com/llm-d-incubation/llm-d-fast-model-actuation/v${FMA_VERSION}/config/crd"
        kubectl apply --server-side \
          -f ${FMA_CRD_BASE}/fma.llm-d.ai_inferenceserverconfigs.yaml \
          -f ${FMA_CRD_BASE}/fma.llm-d.ai_launcherconfigs.yaml \
          -f ${FMA_CRD_BASE}/fma.llm-d.ai_launcherpopulationpolicies.yaml
        kubectl wait --for=condition=Established crd/inferenceserverconfigs.fma.llm-d.ai --timeout=120s
        kubectl wait --for=condition=Established crd/launcherconfigs.fma.llm-d.ai --timeout=120s
        kubectl wait --for=condition=Established crd/launcherpopulationpolicies.fma.llm-d.ai --timeout=120s

  rbac:
    - run: kubectl apply -k ${REPO_ROOT}/guides/${GUIDE_NAME}/rbac/

  fma_controllers:
    - run: |
        helm upgrade --install ${FMA_CHART_INSTANCE_NAME} \
          oci://ghcr.io/llm-d-incubation/llm-d-fast-model-actuation/charts/fma-controllers \
          --version ${FMA_VERSION} \
          --set global.nodeViewClusterRole=fma-node-viewer \
          -n ${NAMESPACE}
    - run: |
        kubectl wait --for=condition=available --timeout=180s \
          deployment "${FMA_CHART_INSTANCE_NAME}-dual-pods-controller" -n ${NAMESPACE}
        kubectl wait --for=condition=available --timeout=120s \
          deployment "${FMA_CHART_INSTANCE_NAME}-launcher-populator" -n ${NAMESPACE}

  standalone:
    - run: |
        helm install ${GUIDE_NAME} \
          ${ROUTER_STANDALONE_CHART} \
          -f ${REPO_ROOT}/guides/recipes/router/base.values.yaml \
          -f ${REPO_ROOT}/guides/${GUIDE_NAME}/router/${GUIDE_NAME}.values.yaml \
          -n ${NAMESPACE} --version ${ROUTER_CHART_VERSION}

  fma_resources:
    - run: kubectl apply -n ${NAMESPACE} -k ${REPO_ROOT}/guides/${GUIDE_NAME}/modelserver/

  requester:
    - run: kubectl apply -n ${NAMESPACE} -k ${REPO_ROOT}/guides/${GUIDE_NAME}/requester/
    - run: kubectl wait --for=condition=ready pod -l app=fma-requester -n ${NAMESPACE} --timeout=300s

verify:
  endpoint:
    standalone:
      - run: export IP=$(kubectl get service ${GUIDE_NAME}-epp -n ${NAMESPACE} -o jsonpath='{.spec.clusterIP}')
  tests:
    request:
      - run: |
          kubectl run curl-test --rm -i --restart=Never \
            --image=${CURL_TEST_IMAGE} \
            --namespace="${NAMESPACE}" \
            --env="IP=${IP}" \
            --env="MODEL=${MODEL}" \
            -- /bin/sh -c 'curl -sS -X POST "http://${IP}/v1/completions" -H "Content-Type: application/json" -d "{\"model\": \"${MODEL}\", \"prompt\": \"How are you today?\"}"'
    sleep_wake:
      - run: kubectl scale deployment fma-requester -n ${NAMESPACE} --replicas=0
      - run: kubectl scale deployment fma-requester -n ${NAMESPACE} --replicas=2
      - run: kubectl wait --for=condition=ready pod -l app=fma-requester -n ${NAMESPACE} --timeout=120s

benchmark:
  setup:
    - run: |
        curl -sSL https://raw.githubusercontent.com/llm-d/llm-d-benchmark/${BENCHMARK_REF}/install.sh | bash
        cd llm-d-benchmark
        source .venv/bin/activate
        llmdbenchmark --version
  endpoint:
    standalone:
      - run: export ENDPOINT_URL="http://$(kubectl get service ${GUIDE_NAME}-epp -n ${NAMESPACE} -o jsonpath='{.spec.clusterIP}')"
  execute:
    - run: |
        llmdbenchmark \
          --spec           guides/${GUIDE_NAME} \
          run \
          --endpoint-url   "${ENDPOINT_URL}" \
          --gateway-class  "${GATEWAY_CLASS}" \
          --model          "${MODEL}" \
          --namespace      "${NAMESPACE}" \
          --harness        "${HARNESS}" \
          --workload       "${WORKLOAD}" \
          --analyze

cleanup:
  - run: kubectl delete -n ${NAMESPACE} -k ${REPO_ROOT}/guides/${GUIDE_NAME}/requester/ --ignore-not-found=true
  - run: kubectl delete -n ${NAMESPACE} -k ${REPO_ROOT}/guides/${GUIDE_NAME}/modelserver/ --ignore-not-found=true
  - run: helm uninstall ${GUIDE_NAME} -n ${NAMESPACE}
  - run: helm uninstall ${FMA_CHART_INSTANCE_NAME} -n ${NAMESPACE}
  - run: kubectl delete -k ${REPO_ROOT}/guides/${GUIDE_NAME}/rbac/ --ignore-not-found=true
  - run: kubectl delete namespace ${NAMESPACE}
  - run: kubectl delete crd inferenceserverconfigs.fma.llm-d.ai launcherconfigs.fma.llm-d.ai launcherpopulationpolicies.fma.llm-d.ai
